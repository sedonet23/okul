<!-- ============================================================================
     SERVIS YERLEŞIM EDITÖRÜ - index.html'e Entegrasyon Örneği
     ============================================================================
     
     Bu dosya, tam entegrasyon için index.html'e eklenmesi gereken kodu gösterir.
     
     ============================================================================ -->

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koruk İlk-Ortaokulu Yönetim Paneli</title>

  <!-- ========== CSS DOSYALARI ========== -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/tasima-takip.css">
  <link rel="stylesheet" href="css/servis-denetim.css">
  <link rel="stylesheet" href="css/dilekce.css">
  <link rel="stylesheet" href="css/tema-modern-acik.css">
  
  <!-- ⭐ SERVIS YERLEŞIM EDITÖRÜ CSS ⭐ -->
  <link rel="stylesheet" href="css/servis-oturma-editor.css">

  <!-- ========== FIREBASE & DİĞER LİBRARİLER ========== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>

<div class="app" id="app">
  <aside class="sidebar">
    <!-- ... mevcut sidebar içeriği ... -->
    <nav class="nav">
      <!-- ... mevcut nav butonları ... -->
      
      <!-- ULAŞIM MENÜSÜ -->
      <div class="nav-separator">— Ulaşım —</div>
      <input type="checkbox" id="ulasimCheck" class="nav-group-check" hidden>
      <label class="nav-group-toggle" for="ulasimCheck">
        <i class="nt-ico ni-tasima" data-lucide="bus"></i>
        <span class="nt-label">Ulaşım</span>
        <span class="toggle-arrow">▶</span>
      </label>
      <div class="nav-group" id="ulasimMenu">
        <button class="nav-tab nav-sub-tab" data-tab="tasima">
          <i class="nt-ico ni-tasima" data-lucide="bus"></i>
          <span class="nt-label">Taşıma</span>
        </button>
        
        <!-- ⭐ SERVIS YERLEŞIM EDITÖRÜ MENÜ BUTON ⭐ -->
        <button class="nav-tab nav-sub-tab" data-tab="servis-oturma-editor">
          <i class="nt-ico" data-lucide="chair"></i>
          <span class="nt-label">Oturma Düzeni</span>
        </button>
        
        <button class="nav-tab nav-sub-tab" data-tab="harita">
          <i class="nt-ico ni-harita" data-lucide="map"></i>
          <span class="nt-label">Harita</span>
        </button>
      </div>
    </nav>
  </aside>

  <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
    <div class="topbar">
      <!-- ... topbar içeriği ... -->
    </div>

    <main class="content">
      
      <!-- ... mevcut sekmeler ... -->

      <!-- ⭐ SERVIS YERLEŞIM EDITÖRÜ SEKMESI ⭐ -->
      <section id="tab-servis-oturma-editor" class="tab-panel" style="display: none;">
        <div class="page-header">
          <div>
            <div class="page-title">💺 Servis Yerleşim Editörü</div>
            <div class="page-sub">Araç koltuk düzenini sürükle-bırak ile düzenleyin</div>
          </div>
          <div class="page-header-actions">
            <button class="btn btn-ghost btn-sm" onclick="location.reload()">🔄 Yenile</button>
            <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Yazdır</button>
            <button class="btn btn-amber" onclick="ServisYerlesimiEditor.toggleEditMode()">
              ✏️ Düzenlemeyi Aç
            </button>
          </div>
        </div>

        <div class="soe-container" data-service-id="">
          
          <!-- Bilgi Kartı -->
          <div class="card">
            <div class="soe-info-card">
              <div class="soe-info-card-left">
                <h2>🚌 Servis Adı</h2>
                <div class="soe-info-card-row">
                  <span class="soe-info-card-label">Şoför</span>
                  <span class="soe-info-card-value">—</span>
                </div>
                <div class="soe-info-card-row">
                  <span class="soe-info-card-label">Araç</span>
                  <span class="soe-info-card-value">—</span>
                </div>
              </div>
              <div class="soe-info-card-right">
                <div class="soe-info-card-row">
                  <span class="soe-info-card-label">Koltuk</span>
                  <span class="soe-info-card-value">0 / 0</span>
                </div>
                <div class="soe-info-card-row">
                  <span class="soe-info-card-label">Doluluk</span>
                  <span class="soe-info-card-value">%0</span>
                </div>
                <div class="soe-capacity-bar">
                  <div class="soe-capacity-fill" style="width: 0%"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Araç Tipi Seçimi -->
          <div class="soe-vehicle-selector">
            <h3>🚐 Araç Tipi Seçin</h3>
            <div class="soe-vehicle-buttons"></div>
          </div>

          <!-- Toolbar -->
          <div class="soe-toolbar" style="display: none;"></div>

          <!-- Canvas -->
          <div class="card">
            <h3 style="margin: 0 0 16px 0; font-size: 14px;">
              🎯 Yerleşim Düzeni
              <span style="float: right; font-size: 12px; color: var(--ink-muted);">
                Koltuk seçmek için tıklayın • Sürükleyerek taşıyın
              </span>
            </h3>
            <div class="soe-canvas-wrapper">
              <div class="soe-canvas"></div>
            </div>
          </div>

        </div>
      </section>

    </main>
  </div>
</div>

<!-- ========== JAVASCRIPT DOSYALARI ========== -->

<!-- Mevcut JS dosyaları -->
<script src="js/auth.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/firebase-init.js" defer></script>

<!-- ⭐ SERVIS YERLEŞIM EDITÖRÜ JS ⭐ -->
<script src="js/servis-oturma-editor.js" defer></script>

<!-- ⭐ ENTEGRASYON HELPER SCRIPTI ⭐ -->
<script defer>
  // Sayfa yüklendiğinde çalışacak
  document.addEventListener('DOMContentLoaded', () => {
    
    // Servis Oturma Editörünü aç
    window.acServisOturamaEdt = function(serviceId) {
      const container = document.querySelector('.soe-container');
      if (!container) {
        console.error('Konteyner bulunamadı');
        return;
      }
      
      container.dataset.serviceId = serviceId;
      
      // Editörü başlat
      if (typeof ServisYerlesimiEditor !== 'undefined') {
        ServisYerlesimiEditor.init(serviceId);
        
        // Sekmeye geç
        if (typeof sekmeAc === 'function') {
          sekmeAc('servis-oturma-editor');
        }
      } else {
        console.error('ServisYerlesimiEditor yüklenemedi');
      }
    };

    console.log('✅ Servis Yerleşim Editörü entegre edildi');
  });
</script>

</body>
</html>

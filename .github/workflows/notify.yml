name: Hatırlatıcı Bildirimleri

on:
  schedule:
    - cron: '*/15 * * * *'   # Her 15 dakikada bir
  workflow_dispatch:           # Elle de çalıştırılabilir

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Al
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Bağımlılıkları Yükle
        run: npm ci

      - name: Bildirimleri Kontrol Et ve Gönder
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-and-notify.js

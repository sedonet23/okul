name: RSS Haber Taraması

on:
  schedule:
    # Her saat başı (UTC) — Türkiye saatiyle de her saat başı
    - cron: '0 * * * *'
  workflow_dispatch: {}

# DÜZELTME: İki çalıştırma yakın zamanda üst üste tetiklenirse (örn. saatlik
# cron ile elle "workflow_dispatch" çakışırsa), ikinci çalıştırma birincinin
# Firestore'a yazmasını beklemeden aynı "yeni" haberleri görüp tekrar
# ekliyor ve tekrar bildirim gönderiyordu — dedup mantığından bağımsız bir
# yarış durumu. Artık aynı anda sadece TEK bir çalıştırma izin veriliyor;
# biri sürerken diğeri tetiklenirse kuyruğa alınır (iptal edilmez).
concurrency:
  group: rss-fetch
  cancel-in-progress: false

jobs:
  rss-fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları kur
        run: npm install

      - name: RSS kaynaklarını tara ve bildirim gönder
        run: node scripts/rss-fetch.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
